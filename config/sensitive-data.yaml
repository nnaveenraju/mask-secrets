# Sensitive Data Masking Configuration
# Global defaults — applies to all Claude Code sessions
# Per-project overrides: create .claude/sensitive-data.yaml in your project root
#
# Config merge: project patterns APPEND to global. Project can override:
#   enabled: false  (disable masking for a specific project)
#   max_file_size: N (override file size limit)

version: 1
enabled: true

# --- Secret Patterns ---
# Each pattern: { name, regex, mask }
# regex: Python-compatible regex. Use (?i) for case-insensitive.
# mask: replacement text shown to Claude instead of the real value.
patterns:
  secrets:
    - name: aws_access_key
      regex: 'AKIA[0-9A-Z]{16}'
      mask: '[MASKED_AWS_KEY]'

    - name: aws_secret_key
      regex: '(?i)aws_secret_access_key\s*[:=]\s*[\"'']?[A-Za-z0-9/+=]{40}'
      mask: '[MASKED_AWS_SECRET]'

    - name: generic_password
      regex: '(?i)(password|passwd|pwd)\s*[:=]\s*(?:[\"''][^\"'']{4,}[\"'']|[^\s\"'']{4,})'
      mask: '[MASKED_PASSWORD]'

    - name: generic_secret
      regex: '(?i)(secret|api_key|apikey|auth_token|access_token)\s*[:=]\s*[\"''][^\"'']{8,}[\"'']'
      mask: '[MASKED_SECRET]'

    - name: jwt_token
      regex: 'eyJ[A-Za-z0-9\-_]+\.eyJ[A-Za-z0-9\-_]+\.[A-Za-z0-9\-_]+'
      mask: '[MASKED_JWT]'

    - name: private_key_header
      regex: '-----BEGIN\s+(RSA\s+|EC\s+|DSA\s+|OPENSSH\s+)?PRIVATE\s+KEY-----'
      mask: '[MASKED_PRIVATE_KEY]'

    - name: github_token
      regex: 'gh[pousr]_[A-Za-z0-9]{36,}'
      mask: '[MASKED_GITHUB_TOKEN]'

    - name: bearer_token
      regex: '(?i)bearer\s+[A-Za-z0-9\-_]{20,}'
      mask: '[MASKED_BEARER]'

    - name: db_connection_string
      regex: '(?i)(mongodb|postgres|mysql|redis|amqp)://[^:\s]+:[^@\s]+@'
      mask: '[MASKED_DB_URL]'

    - name: slack_token
      regex: 'xox[bpas]-[A-Za-z0-9\-]+'
      mask: '[MASKED_SLACK_TOKEN]'

    - name: stripe_key
      regex: '(sk|pk)_(test|live)_[A-Za-z0-9]{20,}'
      mask: '[MASKED_STRIPE_KEY]'

    - name: sendgrid_key
      regex: 'SG\.[A-Za-z0-9_\-]{22}\.[A-Za-z0-9_\-]{43}'
      mask: '[MASKED_SENDGRID_KEY]'

    - name: openai_key
      regex: 'sk-(?!ant-)[A-Za-z0-9\-_]{32,}'
      mask: '[MASKED_OPENAI_KEY]'

    - name: anthropic_key
      regex: 'sk-ant-[A-Za-z0-9\-]{32,}'
      mask: '[MASKED_ANTHROPIC_KEY]'

    - name: google_api_key
      regex: 'AIza[A-Za-z0-9\-_]{35}'
      mask: '[MASKED_GOOGLE_KEY]'

    - name: npm_token
      regex: 'npm_[A-Za-z0-9]{36}'
      mask: '[MASKED_NPM_TOKEN]'

    - name: pypi_token
      regex: 'pypi-[A-Za-z0-9\-_]{50,}'
      mask: '[MASKED_PYPI_TOKEN]'

  pii:
    - name: ssn
      regex: '\b\d{3}-\d{2}-\d{4}\b'
      mask: '[MASKED_SSN]'

    - name: credit_card
      regex: '\b(?:\d{4}[\-\s]?){3}\d{4}\b'
      mask: '[MASKED_CC]'

    - name: email_address
      regex: '\b[A-Za-z0-9._%+\-]+@[A-Za-z0-9.\-]+\.[A-Za-z]{2,}\b'
      mask: '[MASKED_EMAIL]'

    - name: phone_us
      regex: '\b(?:\+1[\-.\s]?)?\(?\d{3}\)?[\-.\s]?\d{3}[\-.\s]?\d{4}\b'
      mask: '[MASKED_PHONE]'

    - name: ip_address_private
      regex: '\b(?:10\.\d{1,3}\.\d{1,3}\.\d{1,3}|172\.(?:1[6-9]|2\d|3[01])\.\d{1,3}\.\d{1,3}|192\.168\.\d{1,3}\.\d{1,3})\b'
      mask: '[MASKED_IP]'

# User-defined custom patterns (same format as above)
# Example:
#   - name: internal_account_id
#     regex: 'ACCT-[0-9]{8}'
#     mask: '[MASKED_ACCOUNT]'
custom_patterns: []

# Files where ALL content gets masked regardless of pattern matches.
# Uses glob/fnmatch syntax against the filename (not full path).
always_mask_files:
  - '.env'
  - '.env.*'
  - '*.pem'
  - '*.key'
  - '*.p12'
  - '*.pfx'
  - '*credentials*'
  - '*secrets*'
  - 'id_rsa*'
  - 'id_ed25519*'

# Files/directories to skip entirely (no masking, no reading).
# Uses glob/fnmatch syntax. Matched against any path component.
skip_patterns:
  - 'node_modules'
  - '.git'
  - '__pycache__'
  - '.venv'
  - 'venv'
  - '*.png'
  - '*.jpg'
  - '*.jpeg'
  - '*.gif'
  - '*.ico'
  - '*.svg'
  - '*.webp'
  - '*.woff'
  - '*.woff2'
  - '*.ttf'
  - '*.eot'
  - '*.pdf'
  - '*.zip'
  - '*.tar'
  - '*.gz'
  - '*.bz2'
  - '*.lock'
  - '*.sum'
  - '*.min.js'
  - '*.min.css'
  - '*.map'
  - '*.wasm'
  - '*.pyc'
  - '*.so'
  - '*.dylib'
  - '*.dll'

# Max file size in bytes. Files larger than this are skipped.
max_file_size: 10485760  # 10 MB

# Temp directory prefix for masked files.
temp_dir_prefix: '/tmp/claude-masked'
